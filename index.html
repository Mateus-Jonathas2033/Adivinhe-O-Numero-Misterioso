<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@700&family=Inter:wght@400;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <title>Protótipo</title>
</head>

<body>

    <div class="container">
        <div class="container__conteudo">
            <div class="container__informacoes">
                <div class="container__texto">
                    <h1></h1>
                    <p class="texto__paragrafo">
                    </p>
                </div>
                <input type="number" min="1" max="100000" class="container__input">
                <div class="jogada container__botoes">
                    <button onclick="verificarJogada()" id="botaoJogada" class="container__botao">Jogar</button>
                    <button onclick="umNovoJogo()" id="reiniciar" class="container__botao" disabled>Novo Jogo</button>
                    <button onclick="dificuldadeMedio()" id="medio" class="container__botao" disabled>Novo Jogo: Médio</button>
                    <button onclick="dificuldadeDificil()" id="dificil" class="container__botao" disabled>Novo Jogo: Difícil</button>
                </div>
            </div>
            <img src="./img/charada22.png" alt="Uma pessoa olhando para a esquerda" class="container__imagem-pessoa" />
        </div>
    </div>




    <script src="app.js" defer></script>
</body>

</html>
